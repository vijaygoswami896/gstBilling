# App
spring:
  application:
    name: gst-billing

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

    # Added: Redis Caching Configuration
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      ssl:
        enabled: ${SPRING_DATA_REDIS_SSL_ENABLED:false}

  # Database Connection Configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST:/}
    ssl:
      enabled: ${SPRING_RABBITMQ_SSL_ENABLED:false}
    listener:
      simple:
        retry:
          # Enable message processing retries
          enabled: true
          # Maximum number of times to try processing the message
          max-attempts: 3
          # Wait 1 second before the first retry
          initial-interval: 1000ms
          # Double the wait time on each retry (1s, then 2s, etc.)
          multiplier: 2.0

# Custom App Properties (JWT & Base URL)
app:
  base-url: ${APP_BASE_URL}
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry: ${JWT_ACCESS_EXPIRY}
    refresh-token-expiry: ${JWT_REFRESH_EXPIRY}

# ===================================================================
# Springdoc OpenAPI / Swagger UI Configurations
# ===================================================================
springdoc:
  api-docs:
    # Customizes the endpoint path for the raw structural data layout
    path: /v3/api-docs
  swagger-ui:
    # Customizes the shortcut path to hit the visual browser console
    path: /swagger-ui.html
    # Sorts operations alphabetically by HTTP method (GET, POST, etc.)
    operations-sorter: alpha
    # Enables a quick filter bar inside the UI to search your endpoints easily
    filter: true