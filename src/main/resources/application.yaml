# App
spring:
  application:
    name: gst-billing

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
    # Added: Redis Caching Configuration
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  # Added: RabbitMQ / CloudAMQP Configuration
  rabbitmq:
    addresses: ${SPRING_RABBITMQ_ADDRESSES}

  # Database Connection Configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

  # Mail (Gmail SMTP — use App Password)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Custom App Properties (JWT & Base URL)
app:
  base-url: ${APP_BASE_URL}
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry: ${JWT_ACCESS_EXPIRY}
    refresh-token-expiry: ${JWT_REFRESH_EXPIRY}

# ===================================================================
# Springdoc OpenAPI / Swagger UI Configurations
# ===================================================================
springdoc:
  api-docs:
    # Customizes the endpoint path for the raw structural data layout
    path: /v3/api-docs
  swagger-ui:
    # Customizes the shortcut path to hit the visual browser console
    path: /swagger-ui.html
    # Sorts operations alphabetically by HTTP method (GET, POST, etc.)
    operations-sorter: alpha
    # Enables a quick filter bar inside the UI to search your endpoints easily
    filter: true