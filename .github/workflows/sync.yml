name: Sync to Hugging Face Hub

on:
  push:
    branches: [master] # Change this to master if your default branch is master
  workflow_dispatch: # Allows you to trigger the sync manually from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: vijaygoswami896/gst-billing-api
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space